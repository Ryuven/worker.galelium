<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Worker Login - Galelium</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC4PKkma67vVXeZvlSv0MNRK5cQvcAvjpg",
    authDomain: "admingalelium.firebaseapp.com",
    projectId: "admingalelium",
    storageBucket: "admingalelium.firebasestorage.app",
    messagingSenderId: "565330048254",
    appId: "1:565330048254:web:bab36aae480989e2bfe1af",
    measurementId: "G-8FRC70X54D"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  async function registerWorker() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        role: "worker",
        createdAt: new Date()
      });

      alert("Регистрация успешна!");
    } catch (error) {
      alert(error.message);
    }
  }

  async function loginWorker() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      const docSnap = await getDoc(doc(db, "users", user.uid));
      if (docSnap.exists() && docSnap.data().role === "worker") {
        window.location.href = "dashboard.html";
      } else {
        alert("Нет доступа к панели.");
        await auth.signOut();
      }
    } catch (error) {
      alert(error.message);
    }
  }

  window.registerWorker = registerWorker;
  window.loginWorker = loginWorker;

</script>
</head>
<body>
<h2>Worker Login - Galelium</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Пароль"><br>
<button onclick="registerWorker()">Регистрация</button>
<button onclick="loginWorker()">Вход</button>
</body>
</html>
